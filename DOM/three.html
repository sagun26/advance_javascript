<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div_1{
            background-color: #76d876;
            width: 100px;
            height: 100px;
            margin: 70px;
            padding: 10px;
            display: inline-block;
         border-color: #212121;
        }
        #div_2{
            background-color: paleturquoise;
            width: 100px;
            height: 100px;
            margin: 70px;
             padding: 10px;
            display: inline-block;
            border-color: #212121;
        }
        #div_3{
            background-color: blueviolet;
            width: 100px;
            height: 100px;
            margin: 70px;
             padding: 10px;
            display: inline-block;
            border-color: #212121;
        }
        #div_4{
            background-color: pink;
            width: 100px;
            height: 100px;
            margin: 70px;
             padding: 10px;
            display: inline-block;
             border-radius: 10%;
             border-color: #141111;
             border-style: line;

        }
        
    </style>
</head>
<body>
    <div class="main_div">
        <div class="box" id="div_1"></div>
        <div class="box" id="div_2"></div>
        <div class="box" id="div_3"></div>
        <div class="box" id="div_4"></div>
    
    </div>
 <script>
   const box = document.querySelectorAll(".box");

   box.forEach((b) => {
        b.onclick = function() {
            b.style.backgroundColor = "red";
        };
   });
 </script>
    
</body>
</html>
