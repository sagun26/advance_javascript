<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color</title>
    <style>
       #container {
        
    width: 100%;
    height: 100vh;
    margin: 10px;
    padding: 10px;
    display: flex;
    align-items: center;
}
    </style>
</head>
<body>
    <div id="container">
         <p>
         click start to change the color
         </p>
         <div class="div1">
             <button id="start" onclick="start()">start</button>
         </div>
         <div class ="div2">
            <button id="stop" onclick="stop()">stop</button>
         </div>
    </div>

    <script>
       let intervalId;

function start(){
 

    intervalId = setInterval(() => {


        const color = "#" + Math.floor(Math.random()*16777215).toString(16);
        document.getElementById("container").style.backgroundColor = color;

    }, 1000);
}

function stop(){
    clearInterval(intervalId);
}
     
    </script>
</body>
</html>
