<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6dd5ed,#2193b0);
}

#todo-container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

#taskInput{
    width:65%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

#addBtn{
    padding:10px 15px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

#addBtn:hover{
    background:#218838;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    background:#f1f1f1;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

li span{
    flex:1;
    margin-left:10px;
}

li button{
    background:#e74c3c;
    border:none;
    color:white;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="todo-container">
   <h1>Todo List</h1>
   <input type="text" id="taskInput" placeholder="Enter task">
   <button id="addBtn">Add Task</button>
   <ul id="taskList"></ul>
</div>

<script src="todo.js"></script>

</body>
</html>
