<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="joke-container">
    <h1> click on the button  to get new joke </h1>
    <button onclick="joke()"> get joke </button>
    </div>
    
</body>
 <script>
    async function joke(){
   
    const response = await fetch('https://official-joke-api.appspot.com/random_joke')   
    const data = await response.json();
     document.getElementById('joke-container').innerHTML = `<div id="joke">
        <h1>${data.setup}</h1>
        <p>${data.punchline}</p>
     </div>
        <button onclick="new_joke()">New joke</button>
     `;
    
   // .then(response => response.json())
    //.then(data => {
      //  const jokeContainer = document.getElementById('joke-container');
        //jokeContainer.innerHTML = `<h1>${data.joke}</h1>`;
    //})

    }

    async function new_joke(){
        const response = await fetch('https://official-joke-api.appspot.com/random_joke')   
        const data = await response.json();
         document.getElementById('joke').innerHTML = `
            <h1>${data.setup}</h1>
            <p>${data.punchline}</p>
         `;
    }

    
 </script>
</html>
